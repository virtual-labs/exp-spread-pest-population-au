<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spread of a Pest Population — Population Invasion — Simulation</title>
<link rel="stylesheet" href="./css/main.css">
</head>
<body>
<div class="card" id="simbox">
      <div class="simbar"><span class="simbar-logo" aria-hidden="true"><img src="images\logo.svg" alt="Amrita Vishwa Vidyapeetham"></span><h1 class="simbar-title">Spread of a Pest Population — Population Invasion</h1><button class="fs-btn" id="fsBtn" onclick="toggleFS()" title="Toggle full screen" aria-label="Toggle full screen">⛶</button></div>
      <div class="sim">
        <div class="controls">
          <div class="field">
            <label>Length of habitat (km) <span class="val" id="v_hab">100</span></label>
            <input type="range" id="hab" min="20" max="500" step="10" value="100" oninput="sync()">
            <div class="hint">Number of habitat cells along the line.</div>
          </div>
          <div class="field">
            <label>Number of years <span class="val" id="v_years">50</span></label>
            <input type="range" id="years" min="5" max="120" step="1" value="50" oninput="sync()">
          </div>
          <div class="field">
            <label>Establishment threshold <span class="val" id="v_estab">10</span></label>
            <input type="range" id="estab" min="1" max="100" step="1" value="10" oninput="sync()">
            <div class="hint">Front = first cell below this density.</div>
          </div>
          <div class="field">
            <label>Initial pest density <span class="val" id="v_init">50</span></label>
            <input type="range" id="init" min="1" max="500" step="1" value="50" oninput="sync()">
          </div>
          <div class="field">
            <label>Dispersal rate (d) <span class="val" id="v_disp">0.2</span></label>
            <input type="range" id="disp" min="0.1" max="0.9" step="0.1" value="0.2" oninput="sync()">
            <div class="hint">Fraction dispersing each year.</div>
          </div>
          <div class="field">
            <label>Population growth rate <span class="val" id="v_rate">4</span></label>
            <input type="range" id="rate" min="1.1" max="8" step="0.1" value="4" oninput="sync()">
          </div>
          <div class="btnrow">
            <button class="btn btn-primary" onclick="plot()">▶ Plot Graph</button>
            <button class="btn btn-ghost" onclick="resetSim()">↺ Reset</button>
          </div>
          <div class="dl-label">Download</div>
<div class="btnrow">
            <button class="btn btn-accent" onclick="downloadPNG()">⤓ PNG</button>
            <button class="btn btn-accent" onclick="downloadCSV()">⤓ CSV</button>
          </div>
        </div>

        <div class="plotwrap">
          <div class="plot-head">
            <span class="plot-title">Spread of the pest front over time</span>
          </div>
          <canvas class="chart" id="chart" width="720" height="460"></canvas>
          <div class="legend" id="legend"></div>
          <div class="readout">
            <span>Cursor: X = <b id="rx">–</b>, Y = <b id="ry">–</b></span>
            <span>Final front: <b id="rfinal">–</b> km</span>
            <span>Mean speed: <b id="rspeed">–</b> km/yr</span>
          </div>
        </div>
      </div>
    </div>
<div class="toast" id="toast"></div>
<script src="./js/main.js"></script>
</body>
</html>
